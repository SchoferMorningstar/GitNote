name: Multi-Platform Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: android
            output: build/app/outputs/flutter-apk/app-release.apk
            artifact_name: gitnote-android.apk
          - os: ubuntu-latest
            platform: linux
            output: build/linux/x64/release/bundle/
            artifact_name: gitnote-linux-x64.zip
          - os: windows-latest
            platform: windows
            output: build/windows/x64/runner/Release/
            artifact_name: gitnote-windows-x64.zip
          - os: macos-latest
            platform: macos
            output: build/macos/Build/Products/Release/GitNote.app
            artifact_name: gitnote-macos.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      # Build Android
      - name: Build Android
        if: matrix.platform == 'android'
        run: flutter build apk --release

      # Build Linux
      - name: Build Linux
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev
          flutter build linux --release
          cd build/linux/x64/release/bundle
          zip -r ../../../../../gitnote-linux-x64.zip .

      # Build Windows
      - name: Build Windows
        if: matrix.platform == 'windows'
        run: |
          flutter build windows --release
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath gitnote-windows-x64.zip

      # Build macOS
      - name: Build macOS
        if: matrix.platform == 'macos'
        run: |
          flutter build macos --release
          cd build/macos/Build/Products/Release
          zip -r ../../../../../gitnote-macos.zip GitNote.app

      # Upload to Release
      - name: Upload to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "*.apk,*.zip"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
